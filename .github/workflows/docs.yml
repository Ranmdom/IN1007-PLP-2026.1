name: "Build, Generate docs, and Deploy"

on:
  push:
    branches:
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: "Use Common Java Build"
      uses: ./.github/actions/common-java-build
    - name: Copy files to docs/
      run: |
        cp PLP_2026/AppUI/target/classes/index.html PLP_2026/docs/interpretador.html
        cp PLP_2026/AppUI/target/javascript/classes.js* PLP_2026/docs/
    - name: Setup Pages
      uses: actions/configure-pages@v5
    - name: Build with Jekyll
      uses: actions/jekyll-build-pages@v1
      with:
        source: ./PLP_2026/docs/
        destination: ./PLP_2026/docs/_site
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./PLP_2026/docs/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
